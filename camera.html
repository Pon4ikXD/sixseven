<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse QR Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .video-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #1a1a1a;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scan-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .scan-frame {
            width: 250px;
            height: 250px;
            border: 2px solid #40a7e3;
            border-radius: 20px;
            box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.5);
        }

        .controls {
            background: #1a1a1a;
            padding: 16px;
            border-top: 1px solid #333;
        }

        .status {
            text-align: center;
            margin-bottom: 12px;
            color: #888;
            font-size: 14px;
        }

        .button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            background: #40a7e3;
            color: white;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .button:active {
            opacity: 0.8;
        }

        .button.stop {
            background: #ff3b30;
        }

        .result {
            background: #1a4d1a;
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
            font-size: 12px;
            word-break: break-all;
            display: none;
        }

        .result.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="video" playsinline></video>
        <div class="scan-overlay">
            <div class="scan-frame"></div>
        </div>
    </div>

    <div class="controls">
        <div class="status" id="status">⏳ Запуск камеры...</div>
        <button class="button" id="scanBtn" onclick="startScan()">▶️ Начать сканирование</button>
        <button class="button stop" id="stopBtn" onclick="stopScan()" style="display: none;">⏹️ Остановить</button>
        <div class="result" id="result"></div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        const video = document.getElementById('video');
        const statusEl = document.getElementById('status');
        const scanBtn = document.getElementById('scanBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resultEl = document.getElementById('result');

        let stream = null;
        let scanning = false;
        let scanInterval = null;

        // Запуск камеры
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });

                video.srcObject = stream;
                await video.play();

                statusEl.textContent = '✅ Камера готова';
                scanBtn.disabled = false;

            } catch (err) {
                statusEl.textContent = '❌ Ошибка: ' + err.message;
                console.error(err);
            }
        }

        // Начать сканирование
        function startScan() {
            if (!stream) return;

            scanning = true;
            scanBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            statusEl.textContent = '🔍 Сканирование...';

            scanInterval = setInterval(scanQR, 500);
        }

        // Остановить сканирование
        function stopScan() {
            scanning = false;
            scanBtn.style.display = 'block';
            stopBtn.style.display = 'none';
            statusEl.textContent = '⏹️ Сканирование остановлено';

            if (scanInterval) {
                clearInterval(scanInterval);
            }
        }

        // Сканирование QR
        function scanQR() {
            if (!scanning || !video.videoWidth) return;

            // Создаем canvas для захвата кадра
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Получаем данные изображения
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

            // Ищем QR код
            const code = jsQR(imageData.data, canvas.width, canvas.height, {
                inversionAttempts: 'dontInvert'
            });

            if (code) {
                // Нашли QR код!
                stopScan();

                // Показываем результат
                resultEl.textContent = '✅ QR найден: ' + code.data.substring(0, 50) + '...';
                resultEl.classList.add('active');
                statusEl.textContent = '✅ QR отправляется...';

                // Отправляем в бота
                sendToBot(code.data);
            }
        }

        // Отправка данных в бота
        function sendToBot(qrData) {
            if (!tg) {
                statusEl.textContent = '❌ Telegram не инициализирован';
                return;
            }

            const payload = {
                type: 'qr_scanned',
                code: qrData,
                timestamp: Date.now()
            };

            tg.sendData(JSON.stringify(payload));
            statusEl.textContent = '✅ QR отправлен в бота!';

            // Показываем кнопку закрытия
            tg.MainButton.setText('Закрыть');
            tg.MainButton.show();
            tg.MainButton.onClick(() => tg.close());
        }

        // Запускаем камеру при загрузке
        initCamera();

        // Очистка при закрытии
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
