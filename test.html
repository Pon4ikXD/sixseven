<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>STATUS TEST</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="text-align: center; padding: 20px;">
    <h2>STATUS TEST</h2>
    <div id="status" style="background: #eee; padding: 20px;">⏳</div>
    <button onclick="send()">ОТПРАВИТЬ</button>

    <script>
        let tg = Telegram.WebApp;
        tg.ready();

        document.getElementById('status').innerText = '✅ Telegram OK';

        function send() {
            document.getElementById('status').innerText = '📤 Отправка...';
            tg.sendData("test");
            document.getElementById('status').innerText = '✅ Отправлено';
        }
    </script>
</body>
</html>
