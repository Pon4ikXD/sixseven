<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="background: black; color: white; text-align: center; padding: 20px;">
    <h1>📱 TEST</h1>

    <div id="status" style="background: #333; padding: 20px; margin: 20px;">
        ⏳ Загрузка...
    </div>

    <button onclick="send1()" style="width: 100%; padding: 20px; margin: 10px; font-size: 20px;">
        ОТПРАВИТЬ 1
    </button>

    <button onclick="send2()" style="width: 100%; padding: 20px; margin: 10px; font-size: 20px;">
        ОТПРАВИТЬ 2
    </button>

    <script>
        let tg = null;

        // Пробуем получить Telegram
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                document.getElementById('status').innerHTML = '✅ Telegram OK';
            } else {
                document.getElementById('status').innerHTML = '❌ Telegram NOT FOUND';
            }
        } catch (e) {
            document.getElementById('status').innerHTML = '❌ Error: ' + e.message;
        }

        function send1() {
            if (!tg) {
                alert('No Telegram');
                return;
            }

            try {
                tg.sendData('test message');
                document.getElementById('status').innerHTML = '✅ Sent!';
            } catch (e) {
                document.getElementById('status').innerHTML = '❌ ' + e.message;
            }
        }

        function send2() {
            if (!tg) {
                alert('No Telegram');
                return;
            }

            try {
                tg.sendData(JSON.stringify({test: 'hello', num: 123}));
                document.getElementById('status').innerHTML = '✅ JSON sent!';
            } catch (e) {
                document.getElementById('status').innerHTML = '❌ ' + e.message;
            }
        }
    </script>
</body>
</html>
