<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 20px;">
    <h1>📷 QR Scanner</h1>
    
    <button onclick="sendTest()" style="padding: 20px; font-size: 20px; background: #40a7e3; color: white; border: none; border-radius: 10px; width: 100%;">
        📤 Отправить тест
    </button>
    
    <p id="status" style="margin-top: 20px;"></p>

    <script>
        const tg = Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        document.getElementById('status').innerText = '✅ Telegram готов';
        
        function sendTest() {
            document.getElementById('status').innerText = '📤 Отправка...';
            
            try {
                tg.sendData(JSON.stringify({
                    type: 'test',
                    message: 'Hello from GitHub!'
                }));
                
                document.getElementById('status').innerText = '✅ Отправлено!';
            } catch (e) {
                document.getElementById('status').innerText = '❌ Ошибка: ' + e.message;
            }
        }
    </script>
</body>
</html>
