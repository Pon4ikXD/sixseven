<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulse QR Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .video-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #1a1a1a;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scan-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .scan-frame {
            width: 250px;
            height: 250px;
            border: 2px solid #40a7e3;
            border-radius: 20px;
            box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #40a7e3;
            top: 0;
            left: 0;
            animation: scan 2s ease-in-out infinite;
            box-shadow: 0 0 10px #40a7e3;
        }

        @keyframes scan {
            0% { top: 0; }
            50% { top: calc(100% - 2px); }
            100% { top: 0; }
        }

        .controls {
            background: #1a1a1a;
            padding: 16px;
            border-top: 1px solid #333;
            max-height: 40%;
            overflow-y: auto;
        }

        .status {
            text-align: center;
            margin-bottom: 12px;
            color: #888;
            font-size: 14px;
            font-weight: 500;
        }

        .button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            background: #40a7e3;
            color: white;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-bottom: 8px;
            -webkit-appearance: none;
        }

        .button:active {
            opacity: 0.7;
        }

        .button.stop {
            background: #ff3b30;
        }

        .button.small {
            background: #333;
            padding: 12px;
            font-size: 14px;
        }

        .result {
            background: #1a4d1a;
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0;
            font-size: 12px;
            word-break: break-all;
            border: 1px solid #00ff00;
        }

        .error {
            background: #4d1a1a;
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0;
            font-size: 12px;
            word-break: break-all;
            border: 1px solid #ff0000;
        }

        .manual-section {
            background: #242424;
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
        }

        .manual-input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #40a7e3;
            background: #1a1a1a;
            color: #fff;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .button-row {
            display: flex;
            gap: 8px;
            margin: 8px 0;
        }

        .button-row .button {
            flex: 1;
            margin-bottom: 0;
        }

        .debug-panel {
            background: #0a0a0a;
            border-radius: 8px;
            padding: 8px;
            margin-top: 12px;
            font-family: monospace;
            font-size: 10px;
            color: #888;
            max-height: 80px;
            overflow-y: auto;
        }

        .telegram-badge {
            background: #1a2a3a;
            border-radius: 6px;
            padding: 6px;
            margin: 8px 0;
            font-size: 11px;
            text-align: center;
            border: 1px solid #40a7e3;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="video" playsinline autoplay></video>
        <div class="scan-overlay">
            <div class="scan-frame">
                <div class="scan-line"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="telegram-badge" id="tgStatus">⏳ Инициализация Telegram...</div>
        <div class="status" id="status">📱 Готов к работе</div>

        <div class="button-row">
            <button class="button" onclick="startScan()" id="scanBtn">▶️ Сканировать</button>
            <button class="button stop" onclick="stopScan()" id="stopBtn" style="display: none;">⏹️ Стоп</button>
        </div>

        <div class="button-row">
            <button class="button small" onclick="testTelegram()">📱 Тест TG</button>
            <button class="button small" onclick="sendTest()">🧪 Тест отправки</button>
            <button class="button small" onclick="forceReinit()">🔄 Переинициализация</button>
        </div>

        <div id="messageArea"></div>

        <div class="manual-section">
            <input type="text" class="manual-input" id="manualInput" placeholder="Вставьте QR-код">
            <button class="button small" onclick="sendManual()">📤 Отправить</button>
        </div>

        <div class="debug-panel" id="debugLog">✓ Система готова</div>
    </div>

    <script>
        // ============================================
        // КРИТИЧЕСКИ ВАЖНО: Инициализация Telegram ПЕРВОЙ
        // ============================================
        let tg = null;
        let webappReady = false;
        let initAttempts = 0;

        // Немедленная инициализация
        (function forceTelegramInit() {
            console.log('🔄 Принудительная инициализация Telegram...');

            try {
                if (window.Telegram && window.Telegram.WebApp) {
                    tg = window.Telegram.WebApp;
                    tg.ready();
                    tg.expand();
                    webappReady = true;

                    // Сохраняем в несколько мест для надёжности
                    window.tg = tg;
                    window.telegram = tg;

                    console.log('✅ Telegram инициализирован:', tg.platform || 'unknown');

                    // Обновляем UI
                    const tgStatus = document.getElementById('tgStatus');
                    if (tgStatus) {
                        tgStatus.innerHTML = `✅ Telegram: ${tg.platform || 'web'} | v${tg.version || '?'}`;
                        tgStatus.style.background = '#1a4d1a';
                    }
                } else {
                    console.log('❌ Telegram WebApp не найден');

                    // Пробуем ещё раз через секунду
                    initAttempts++;
                    if (initAttempts < 5) {
                        setTimeout(forceTelegramInit, 1000);
                    }
                }
            } catch (e) {
                console.log('❌ Ошибка инициализации:', e);
            }
        })();

        // ============================================
        // ОСНОВНОЙ КОД
        // ============================================

        // DOM элементы
        const video = document.getElementById('video');
        const statusEl = document.getElementById('status');
        const scanBtn = document.getElementById('scanBtn');
        const stopBtn = document.getElementById('stopBtn');
        const messageArea = document.getElementById('messageArea');
        const manualInput = document.getElementById('manualInput');
        const debugLog = document.getElementById('debugLog');

        let stream = null;
        let scanning = false;
        let scanInterval = null;
        let debugMessages = [];

        // Логирование
        function addDebug(msg) {
            const time = new Date().toLocaleTimeString();
            debugMessages.unshift(`[${time}] ${msg}`);
            if (debugMessages.length > 5) debugMessages.pop();
            debugLog.innerHTML = debugMessages.join('<br>');
            console.log(msg);
        }

        // Обновление статуса
        function setStatus(msg) {
            statusEl.textContent = msg;
            addDebug(msg);
        }

        // Показать сообщение
        function showMessage(msg, isError = false) {
            const div = document.createElement('div');
            div.className = isError ? 'error' : 'result';
            div.textContent = msg;
            messageArea.innerHTML = '';
            messageArea.appendChild(div);

            setTimeout(() => {
                if (messageArea.firstChild === div) {
                    messageArea.innerHTML = '';
                }
            }, 3000);
        }

        // ============================================
        // УЛУЧШЕННАЯ ФУНКЦИЯ ОТПРАВКИ
        // ============================================
        function sendToBot(data) {
            addDebug('📤 Попытка отправки...');

            // Пробуем получить tg из всех возможных источников
            let telegram = tg || window.tg || window.telegram;

            if (!telegram) {
                try {
                    if (window.Telegram && window.Telegram.WebApp) {
                        telegram = window.Telegram.WebApp;
                        telegram.ready();
                    }
                } catch (e) {}
            }

            if (!telegram) {
                const errorMsg = '❌ Telegram не инициализирован';
                setStatus(errorMsg);
                showMessage(errorMsg, true);
                addDebug(errorMsg);
                return false;
            }

            try {
                // Подготавливаем данные
                const payload = typeof data === 'string' ? data : JSON.stringify(data);

                addDebug(`📦 Данные: ${payload.substring(0, 100)}`);

                // ОТПРАВКА - самый важный момент!
                telegram.sendData(payload);

                // Успех
                setStatus('✅ Данные отправлены!');
                showMessage('✅ QR-код отправлен в бота!');
                addDebug('✅ Отправка успешна!');

                // Показываем кнопку закрытия
                if (telegram.MainButton) {
                    telegram.MainButton.setText('✅ Закрыть');
                    telegram.MainButton.show();
                    telegram.MainButton.onClick(() => telegram.close());
                }

                return true;

            } catch (e) {
                const errorMsg = `❌ Ошибка: ${e.message}`;
                setStatus(errorMsg);
                showMessage(errorMsg, true);
                addDebug(`❌ ${e.message}`);
                return false;
            }
        }

        // Тест Telegram
        function testTelegram() {
            addDebug('🔍 Тест Telegram...');

            let telegram = tg || window.tg;

            if (!telegram) {
                forceTelegramInit();
                telegram = tg;
            }

            if (telegram) {
                const info = `✅ Telegram: ${telegram.platform || 'web'}, версия: ${telegram.version || '?'}`;
                setStatus(info);
                showMessage(info);
                addDebug(info);

                document.getElementById('tgStatus').innerHTML = info;
            } else {
                const error = '❌ Telegram НЕ доступен';
                setStatus(error);
                showMessage(error, true);
                addDebug(error);
            }
        }

        // Тест отправки
        function sendTest() {
            const testData = {
                type: 'test',
                message: 'Тест с телефона',
                timestamp: Date.now(),
                platform: tg ? tg.platform : 'unknown'
            };

            sendToBot(testData);
        }

        // Принудительная переинициализация
        function forceReinit() {
            addDebug('🔄 Переинициализация...');
            tg = null;
            window.tg = null;
            window.telegram = null;

            forceTelegramInit();

            setTimeout(() => {
                testTelegram();
            }, 1000);
        }

        // Отправка QR
        function sendQR(qrData) {
            const qrPayload = {
                type: 'qr_scanned',
                code: qrData,
                timestamp: Date.now()
            };

            sendToBot(qrPayload);
        }

        // Ручная отправка
        function sendManual() {
            const text = manualInput.value.trim();
            if (!text) {
                showMessage('❌ Введите данные', true);
                return;
            }
            sendQR(text);
            manualInput.value = '';
        }

        // Инициализация камеры
        async function initCamera() {
            try {
                setStatus('⏳ Запрос камеры...');

                const constraints = {
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };

                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                await video.play();

                setStatus('✅ Камера готова');

            } catch (err) {
                setStatus('❌ Ошибка камеры');
                showMessage('❌ ' + err.message, true);
            }
        }

        // Начать сканирование
        function startScan() {
            if (!stream) {
                initCamera().then(startScan);
                return;
            }

            scanning = true;
            scanBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            setStatus('🔍 Сканирование...');

            scanInterval = setInterval(() => {
                if (!scanning || !video.videoWidth) return;

                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, canvas.width, canvas.height);

                    if (code && code.data && code.data.length > 10) {
                        addDebug('✅ QR найден!');
                        stopScan();
                        sendQR(code.data);
                    }
                } catch (e) {}
            }, 300);
        }

        function stopScan() {
            scanning = false;
            scanBtn.style.display = 'block';
            stopBtn.style.display = 'none';
            setStatus('⏹️ Остановлено');

            if (scanInterval) {
                clearInterval(scanInterval);
                scanInterval = null;
            }
        }

        // Очистка
        function cleanup() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            if (scanInterval) {
                clearInterval(scanInterval);
            }
        }

        // Запуск
        window.addEventListener('load', () => {
            addDebug('📱 Страница загружена');

            // Проверяем URL
            addDebug('🌐 ' + window.location.href);

            // Запускаем камеру
            initCamera();

            // Проверяем Telegram через секунду
            setTimeout(testTelegram, 1000);
        });

        window.addEventListener('beforeunload', cleanup);
    </script>
</body>
</html>
