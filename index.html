<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulse QR Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .video-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #1a1a1a;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scan-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .scan-frame {
            width: 250px;
            height: 250px;
            border: 2px solid #40a7e3;
            border-radius: 20px;
            box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #40a7e3;
            top: 0;
            left: 0;
            animation: scan 2s ease-in-out infinite;
            box-shadow: 0 0 10px #40a7e3;
        }

        @keyframes scan {
            0% { top: 0; }
            50% { top: calc(100% - 2px); }
            100% { top: 0; }
        }

        .controls {
            background: #1a1a1a;
            padding: 16px;
            border-top: 1px solid #333;
            max-height: 40%;
            overflow-y: auto;
        }

        .status {
            text-align: center;
            margin-bottom: 12px;
            color: #888;
            font-size: 14px;
            font-weight: 500;
        }

        .status.success { color: #4caf50; }
        .status.error { color: #ff5252; }
        .status.info { color: #40a7e3; }

        .button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            background: #40a7e3;
            color: white;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-bottom: 8px;
            -webkit-appearance: none;
        }

        .button:active {
            opacity: 0.7;
        }

        .button.stop {
            background: #ff3b30;
        }

        .button.small {
            background: #333;
            padding: 12px;
            font-size: 14px;
        }

        .result {
            background: #1a4d1a;
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0;
            font-size: 12px;
            word-break: break-all;
            border: 1px solid #00ff00;
        }

        .error {
            background: #4d1a1a;
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0;
            font-size: 12px;
            word-break: break-all;
            border: 1px solid #ff0000;
        }

        .manual-section {
            background: #242424;
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
        }

        .manual-input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #40a7e3;
            background: #1a1a1a;
            color: #fff;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .button-row {
            display: flex;
            gap: 8px;
            margin: 8px 0;
        }

        .button-row .button {
            flex: 1;
            margin-bottom: 0;
        }

        .debug-log {
            font-family: monospace;
            font-size: 10px;
            color: #666;
            margin-top: 12px;
            padding: 8px;
            background: #0a0a0a;
            border-radius: 6px;
            max-height: 80px;
            overflow-y: auto;
        }

        .telegram-info {
            background: #1a2a3a;
            border-radius: 8px;
            padding: 8px;
            margin: 8px 0;
            font-size: 11px;
            border: 1px solid #40a7e3;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="video" playsinline autoplay></video>
        <div class="scan-overlay">
            <div class="scan-frame">
                <div class="scan-line"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="status" id="status">⏳ Загрузка...</div>

        <div class="telegram-info" id="telegramInfo">
            📱 Telegram: проверка...
        </div>

        <div class="button-row">
            <button class="button" onclick="startScan()" id="scanBtn">▶️ Сканировать</button>
            <button class="button stop" onclick="stopScan()" id="stopBtn" style="display: none;">⏹️ Стоп</button>
        </div>

        <div class="button-row">
            <button class="button small" onclick="testTelegram()">📱 Тест TG</button>
            <button class="button small" onclick="sendTestData()">🧪 Тест отправки</button>
            <button class="button small" onclick="sendDebugInfo()">🔍 Debug</button>
        </div>

        <div id="messageArea"></div>

        <div class="manual-section">
            <input type="text" class="manual-input" id="manualInput" placeholder="Вставьте QR-код или токен">
            <button class="button small" onclick="sendManual()">📤 Отправить вручную</button>
        </div>

        <div class="debug-log" id="debugLog">✓ Система готова</div>
    </div>

    <script>
        // Глобальные переменные
        let tg = null;
        let webappReady = false;
        let stream = null;
        let scanning = false;
        let scanInterval = null;
        let debugMessages = [];
        let sendAttempts = 0;

        // DOM элементы
        const video = document.getElementById('video');
        const statusEl = document.getElementById('status');
        const telegramInfo = document.getElementById('telegramInfo');
        const scanBtn = document.getElementById('scanBtn');
        const stopBtn = document.getElementById('stopBtn');
        const messageArea = document.getElementById('messageArea');
        const manualInput = document.getElementById('manualInput');
        const debugLog = document.getElementById('debugLog');

        // Логирование
        function addDebug(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : '📌';
            const line = `${icon} [${timestamp}] ${message}`;

            debugMessages.unshift(line);
            if (debugMessages.length > 8) debugMessages.pop();

            debugLog.innerHTML = debugMessages.join('<br>');
            console.log(message);
        }

        // Обновление статуса
        function setStatus(text, type = 'info') {
            statusEl.textContent = text;
            statusEl.className = 'status ' + type;
            addDebug(text, type);
        }

        // Показать сообщение пользователю
        function showMessage(text, isError = false) {
            const div = document.createElement('div');
            div.className = isError ? 'error' : 'result';
            div.textContent = text;
            messageArea.innerHTML = '';
            messageArea.appendChild(div);

            setTimeout(() => {
                if (messageArea.firstChild === div) {
                    messageArea.innerHTML = '';
                }
            }, 4000);
        }

        // Тест Telegram подключения
        function testTelegram() {
            addDebug('🔍 Проверка Telegram...');

            try {
                if (window.Telegram && window.Telegram.WebApp) {
                    tg = window.Telegram.WebApp;
                    tg.ready();
                    tg.expand();
                    webappReady = true;

                    const platform = tg.platform || 'unknown';
                    const version = tg.version || 'unknown';
                    const theme = tg.colorScheme || 'unknown';

                    // Показываем информацию
                    const info = `✅ Telegram OK
                        Platform: ${platform}
                        Version: ${version}
                        Theme: ${theme}`;

                    telegramInfo.innerHTML = info.replace(/\n/g, '<br>');
                    setStatus(`✅ Telegram: ${platform}`, 'success');

                    // Проверяем данные пользователя
                    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                        const user = tg.initDataUnsafe.user;
                        addDebug(`👤 User: ${user.id} (${user.first_name})`, 'success');
                    }

                    // Проверяем возможность отправки
                    if (typeof tg.sendData === 'function') {
                        addDebug('📤 sendData доступен', 'success');
                    } else {
                        addDebug('❌ sendData НЕ доступен', 'error');
                    }

                    return true;
                } else {
                    telegramInfo.innerHTML = '❌ Telegram WebApp не найден';
                    setStatus('❌ Telegram не доступен', 'error');
                    addDebug('❌ window.Telegram.WebApp отсутствует', 'error');
                    return false;
                }
            } catch (e) {
                telegramInfo.innerHTML = `❌ Ошибка: ${e.message}`;
                setStatus('❌ Ошибка инициализации', 'error');
                addDebug('❌ ' + e.message, 'error');
                return false;
            }
        }

        // Отправка данных с несколькими попытками
        function sendDataToBot(data) {
            sendAttempts++;

            if (!tg) {
                if (!testTelegram()) {
                    showMessage('❌ Telegram не инициализирован', true);
                    return false;
                }
            }

            try {
                // Подготавливаем данные в разных форматах
                const dataStr = JSON.stringify(data);
                addDebug(`📤 Попытка ${sendAttempts}: ${dataStr.substring(0, 100)}`);

                // Способ 1: Прямая отправка
                tg.sendData(dataStr);
                addDebug('✅ Отправлено методом 1', 'success');

                // Показываем успех
                setStatus('✅ Данные отправлены!', 'success');
                showMessage('✅ Отправлено в бота!');

                // Показываем кнопку закрытия
                tg.MainButton.setText('✅ Закрыть');
                tg.MainButton.show();
                tg.MainButton.onClick(() => tg.close());

                return true;

            } catch (e1) {
                addDebug(`❌ Метод 1 ошибка: ${e1.message}`, 'error');

                try {
                    // Способ 2: Через callback
                    if (tg.sendDataToBot) {
                        tg.sendDataToBot(dataStr);
                        addDebug('✅ Отправлено методом 2', 'success');
                        return true;
                    }
                } catch (e2) {
                    addDebug(`❌ Метод 2 ошибка: ${e2.message}`, 'error');

                    try {
                        // Способ 3: Через iframe
                        const iframe = document.createElement('iframe');
                        iframe.style.display = 'none';
                        iframe.src = 'tg://sendMessage?' + encodeURIComponent(dataStr);
                        document.body.appendChild(iframe);
                        setTimeout(() => document.body.removeChild(iframe), 100);
                        addDebug('✅ Отправлено методом 3', 'success');
                        return true;
                    } catch (e3) {
                        addDebug(`❌ Все методы не сработали`, 'error');
                        showMessage('❌ Не удалось отправить данные', true);
                        return false;
                    }
                }
            }
        }

        // Тест отправки
        function sendTestData() {
            const testData = {
                type: 'test',
                message: 'Тест с телефона',
                timestamp: Date.now(),
                attempt: sendAttempts + 1
            };

            sendDataToBot(testData);
        }

        // Отправка отладочной информации
        function sendDebugInfo() {
            const debug = {
                type: 'debug',
                url: window.location.href,
                userAgent: navigator.userAgent,
                platform: tg ? tg.platform : 'none',
                timestamp: Date.now(),
                screen: `${window.screen.width}x${window.screen.height}`,
                webappReady: webappReady
            };

            sendDataToBot(debug);
        }

        // Отправка QR кода
        function sendQR(qrData) {
            const qrPayload = {
                type: 'qr_scanned',
                code: qrData,
                timestamp: Date.now(),
                length: qrData.length
            };

            sendDataToBot(qrPayload);
        }

        // Ручная отправка
        function sendManual() {
            const text = manualInput.value.trim();
            if (!text) {
                showMessage('❌ Введите данные', true);
                return;
            }
            sendQR(text);
            manualInput.value = '';
        }

        // Инициализация камеры
        async function initCamera() {
            try {
                setStatus('⏳ Запрос камеры...', 'info');

                const constraints = {
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };

                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;

                await video.play();
                setStatus('✅ Камера готова', 'success');

            } catch (err) {
                setStatus('❌ Ошибка камеры', 'error');
                showMessage('❌ ' + err.message, true);
                addDebug('❌ ' + err.message, 'error');
            }
        }

        // Начать сканирование
        function startScan() {
            if (!stream) {
                initCamera().then(startScan);
                return;
            }

            scanning = true;
            scanBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            setStatus('🔍 Сканирование...', 'info');

            scanInterval = setInterval(() => {
                if (!scanning || !video.videoWidth) return;

                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, canvas.width, canvas.height);

                    if (code && code.data && code.data.length > 10) {
                        addDebug('✅ QR обнаружен!', 'success');
                        stopScan();
                        sendQR(code.data);
                    }
                } catch (e) {
                    // Тихая ошибка сканирования
                }
            }, 300);
        }

        // Остановить сканирование
        function stopScan() {
            scanning = false;
            scanBtn.style.display = 'block';
            stopBtn.style.display = 'none';
            setStatus('⏹️ Остановлено', 'info');

            if (scanInterval) {
                clearInterval(scanInterval);
                scanInterval = null;
            }
        }

        // Очистка ресурсов
        function cleanup() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            if (scanInterval) {
                clearInterval(scanInterval);
            }
        }

        // Инициализация
        window.addEventListener('load', () => {
            addDebug('📱 Страница загружена');
            addDebug('🌐 URL: ' + window.location.href);

            // Проверяем, открыто ли в Telegram
            if (navigator.userAgent.includes('Telegram')) {
                addDebug('📱 Запущено в Telegram WebView');
            } else {
                addDebug('🌐 Запущено в браузере');
            }

            testTelegram();
            initCamera();
        });

        window.addEventListener('beforeunload', cleanup);
    </script>
</body>
</html>
