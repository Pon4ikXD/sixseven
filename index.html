<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse QR Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        /* ... ваши стили ... */
    </style>
</head>
<body>
    <div class="video-container">
        <video id="video" playsinline></video>
        <div class="scan-overlay">
            <div class="scan-frame">
                <div class="scan-line"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="status" id="status">⏳ Запуск камеры...</div>

        <div class="flex-row">
            <button class="button" id="scanBtn" onclick="startScan()">▶️ Сканировать</button>
            <button class="button stop" id="stopBtn" onclick="stopScan()" style="display: none;">⏹️ Стоп</button>
        </div>

        <div id="resultArea"></div>

        <div class="manual-section">
            <input type="text" class="manual-input" id="manualQr" placeholder="Вставьте QR-код">
            <button class="button small-button" onclick="sendManual()">📤 Отправить</button>
        </div>

        <div class="test-buttons">
            <button class="button small-button" onclick="testTelegram()">📱 Тест Telegram</button>
            <button class="button small-button" onclick="sendTestData()">🧪 Тест отправки</button>
        </div>

        <div class="debug-log" id="debugLog">✓ Система готова</div>
    </div>

    <script>
        // Глобальные переменные
        let tg = null;
        let webappReady = false;
        let stream = null;
        let scanning = false;
        let scanInterval = null;
        let debugMessages = [];

        // DOM элементы
        const video = document.getElementById('video');
        const statusEl = document.getElementById('status');
        const scanBtn = document.getElementById('scanBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resultArea = document.getElementById('resultArea');
        const manualQr = document.getElementById('manualQr');
        const debugLogEl = document.getElementById('debugLog');

        // Логирование
        function addDebug(message) {
            const timestamp = new Date().toLocaleTimeString();
            debugMessages.unshift(`[${timestamp}] ${message}`);
            if (debugMessages.length > 5) debugMessages.pop();
            debugLogEl.innerHTML = debugMessages.join('<br>');
            console.log(message);
        }

        // Обновление статуса
        function setStatus(text, isError = false) {
            statusEl.textContent = text;
            statusEl.style.color = isError ? '#ff5252' : '#40a7e3';
            addDebug(text);
        }

        // Показать результат
        function showResult(text, isError = false) {
            const div = document.createElement('div');
            div.className = isError ? 'error' : 'result';
            div.textContent = text;
            resultArea.innerHTML = '';
            resultArea.appendChild(div);

            setTimeout(() => {
                if (resultArea.firstChild === div) {
                    resultArea.innerHTML = '';
                }
            }, 3000);
        }

        // Тест Telegram подключения
        function testTelegram() {
            addDebug('🔍 Проверка Telegram...');

            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                webappReady = true;

                setStatus('✅ Telegram подключен');
                showResult('✅ Telegram работает!');
                addDebug(`✅ Версия: ${tg.version}, Платформа: ${tg.platform}`);

                // Показываем информацию
                if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                    const user = tg.initDataUnsafe.user;
                    addDebug(`👤 Пользователь: ${user.first_name}`);
                }

                return true;
            } else {
                setStatus('❌ Telegram не найден', true);
                showResult('❌ Откройте через бота Telegram!', true);
                return false;
            }
        }

        // Тест отправки данных
        function sendTestData() {
            if (!tg) {
                if (!testTelegram()) return;
            }

            try {
                const testData = JSON.stringify({
                    type: 'test',
                    message: 'Тест из WebApp',
                    timestamp: Date.now()
                });

                addDebug('📤 Отправка теста: ' + testData);
                tg.sendData(testData);

                setStatus('✅ Тест отправлен');
                showResult('✅ Тестовые данные отправлены!');

            } catch (e) {
                setStatus('❌ Ошибка: ' + e.message, true);
                showResult('❌ ' + e.message, true);
            }
        }

        // Отправка QR в бота
        function sendToBot(qrData) {
            if (!tg) {
                if (!testTelegram()) return;
            }

            try {
                // Пробуем разные форматы для совместимости
                const formats = [
                    JSON.stringify({ type: 'qr_scanned', code: qrData, timestamp: Date.now() }),
                    JSON.stringify({ qr: qrData }),
                    JSON.stringify({ data: qrData, type: 'qr' })
                ];

                let sent = false;
                for (const format of formats) {
                    try {
                        addDebug('📤 Попытка: ' + format.substring(0, 100));
                        tg.sendData(format);
                        sent = true;
                        break;
                    } catch (e) {
                        addDebug('⚠️ Ошибка формата: ' + e.message);
                    }
                }

                if (sent) {
                    setStatus('✅ QR отправлен!');
                    showResult('✅ QR-код отправлен в бота!');

                    // Показываем кнопку закрытия
                    tg.MainButton.setText('✅ Закрыть');
                    tg.MainButton.show();
                    tg.MainButton.onClick(() => tg.close());
                } else {
                    throw new Error('Не удалось отправить');
                }

            } catch (e) {
                setStatus('❌ Ошибка: ' + e.message, true);
                showResult('❌ ' + e.message, true);
            }
        }

        // Ручная отправка
        function sendManual() {
            const text = manualQr.value.trim();
            if (!text) {
                showResult('❌ Введите данные', true);
                return;
            }
            sendToBot(text);
            manualQr.value = '';
        }

        // Инициализация камеры
        async function initCamera() {
            try {
                setStatus('⏳ Запрос камеры...');

                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 }
                    }
                });

                video.srcObject = stream;
                await video.play();

                setStatus('✅ Камера готова');
                scanBtn.disabled = false;

            } catch (err) {
                setStatus('❌ Ошибка камеры: ' + err.message, true);
            }
        }

        // Начать сканирование
        function startScan() {
            if (!stream) {
                initCamera().then(startScan);
                return;
            }

            scanning = true;
            scanBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            setStatus('🔍 Сканирование...');

            scanInterval = setInterval(scanQR, 200);
        }

        // Остановить сканирование
        function stopScan() {
            scanning = false;
            scanBtn.style.display = 'block';
            stopBtn.style.display = 'none';
            setStatus('⏹️ Остановлено');

            if (scanInterval) {
                clearInterval(scanInterval);
            }
        }

        // Сканирование QR
        function scanQR() {
            if (!scanning || !video.videoWidth) return;

            try {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, canvas.width, canvas.height);

                if (code && code.data && code.data.length > 10) {
                    addDebug('✅ QR найден: ' + code.data.substring(0, 50));
                    stopScan();
                    sendToBot(code.data);
                }
            } catch (err) {
                // Тихая ошибка
            }
        }

        // Очистка
        function cleanup() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            if (scanInterval) {
                clearInterval(scanInterval);
            }
        }

        // Инициализация
        window.addEventListener('load', () => {
            addDebug('📱 Страница загружена');
            testTelegram();
            initCamera();
        });

        window.addEventListener('beforeunload', cleanup);
    </script>
</body>
</html>
