<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: sans-serif;
        }
        
        #video {
            width: 100%;
            height: 100vh;
            object-fit: cover;
        }
        
        #result {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            z-index: 1000;
        }
        
        #sendButton {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: #40a7e3;
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>
    <video id="video" playsinline></video>
    <canvas id="canvas" style="display: none;"></canvas>
    
    <div id="sendButton" onclick="sendToBot()">📤 Отправить QR в бота</div>
    <div id="result">⏳ Запуск камеры...</div>

    <script>
        let tg = null;
        let lastQRCode = null;
        
        // Инициализация Telegram
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                console.log('Telegram готов');
            }
        } catch (e) {
            console.error('Ошибка Telegram:', e);
        }

        // Запуск камеры
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                
                const video = document.getElementById('video');
                video.srcObject = stream;
                await video.play();
                
                document.getElementById('result').innerHTML = '✅ Камера запущена<br>Наведите на QR код';
                
                // Запускаем сканирование
                setInterval(scanQR, 1000);
                
            } catch (err) {
                document.getElementById('result').innerHTML = '❌ Ошибка камеры: ' + err.message;
            }
        }

        // Сканирование QR
        function scanQR() {
            const video = document.getElementById('video');
            if (!video.videoWidth) return;
            
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, canvas.width, canvas.height);
            
            if (code) {
                lastQRCode = code.data;
                document.getElementById('sendButton').style.display = 'block';
                document.getElementById('result').innerHTML = '✅ QR найден!<br>' + code.data.substring(0, 50) + '...';
            }
        }

        // Отправка в бота
        function sendToBot() {
            if (!lastQRCode) return;
            
            if (tg) {
                // Пытаемся отправить через Telegram
                tg.sendData(JSON.stringify({
                    type: 'qr_scanned',
                    code: lastQRCode,
                    timestamp: Date.now()
                }));
                
                document.getElementById('result').innerHTML = '✅ Отправлено в бота!';
                document.getElementById('sendButton').style.display = 'none';
            } else {
                // Если Telegram не работает - копируем в буфер
                navigator.clipboard.writeText(lastQRCode).then(() => {
                    document.getElementById('result').innerHTML = '✅ QR скопирован! Отправьте боту';
                    document.getElementById('sendButton').style.display = 'none';
                });
            }
        }

        // Запуск
        startCamera();
    </script>
</body>
</html>
