<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QR Scanner</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>

<style>
body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    margin: 0;
    padding: 16px;
    background: var(--tg-theme-bg-color, #fff);
    color: var(--tg-theme-text-color, #000);
}

h2 { margin-bottom: 16px; }

#reader {
    width: 100%;
    max-width: 500px;
    margin: 0 auto 16px auto;
    border-radius: 12px;
    overflow: hidden;
}

button {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 10px;
    background: var(--tg-theme-button-color, #40a7e3);
    color: var(--tg-theme-button-text-color, #fff);
}

button.secondary {
    background: #eee;
    color: #000;
}

.status {
    margin-top: 10px;
    font-size: 14px;
    word-break: break-all;
}
</style>
</head>

<body>

<h2>📷 Сканирование QR</h2>

<div id="reader"></div>

<button onclick="startScanner()">▶️ Начать</button>
<button class="secondary" onclick="stopScanner()">⏹️ Остановить</button>
<button class="secondary" onclick="sendTest()">🔍 Тест</button>

<div class="status" id="status"></div>

<script>
let tg = null;
let html5QrCode = null;
let isScanning = false;

const statusEl = document.getElementById("status");

// ========================================
// TELEGRAM INIT
// ========================================
function initTelegram() {
    // ИСПРАВЛЕНО: Добавлен оператор || для проверки
    if (!window.Telegram || !window.Telegram.WebApp) {
        setStatus("❌ Откройте страницу через Telegram бота");
        return false;
    }

    tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // ИСПРАВЛЕНО: Добавлен оператор || для проверки
    if (!tg.initData || tg.initData.length === 0) {
        setStatus("❌ Страница открыта не как WebApp (нужно открыть кнопкой в боте)");
        return false;
    }

    setStatus("✅ Telegram WebApp подключён");
    return true;
}

function setStatus(text) {
    statusEl.textContent = text;
}

// ========================================
// SEND DATA
// ========================================
function sendToBot(qrText) {
    if (!tg && !initTelegram()) return;

    const payload = {
        type: "qr_scanned",
        code: qrText,
        timestamp: Date.now()
    };

    tg.sendData(JSON.stringify(payload));
    setStatus("✅ QR отправлен в бота");
}

function sendTest() {
    if (!tg && !initTelegram()) return;

    tg.sendData(JSON.stringify({
        type: "test",
        message: "Test OK",
        timestamp: Date.now()
    }));

    setStatus("✅ Тест отправлен");
}

// ========================================
// SCANNER
// ========================================
function startScanner() {
    if (isScanning) return;

    if (!html5QrCode) {
        html5QrCode = new Html5Qrcode("reader");
    }

    // ИСПРАВЛЕНО: Удалена лишняя стрелочная функция, которая не возвращала значение и вызывала ошибку
    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        (decodedText) => {
            sendToBot(decodedText);
        },
        (error) => {
            // Можно оставить пустым или добавить логирование, если нужно
            // console.warn(error);
        }
    ).then(() => {
        isScanning = true;
        setStatus("🔍 Сканирование...");
    }).catch(err => {
        setStatus("❌ Ошибка камеры: " + err);
    });
}

function stopScanner() {
    if (!isScanning || !html5QrCode) return;

    html5QrCode.stop().then(() => {
        isScanning = false;
        setStatus("⏹️ Сканирование остановлено");
    });
}

// ========================================
// START
// ========================================
document.addEventListener("DOMContentLoaded", () => {
    initTelegram();
});
</script>

</body>
</html>
