<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 20px;">
    <h1>📷 QR Scanner</h1>
    
    <div style="background: #ffd700; padding: 20px; border-radius: 10px; margin: 20px 0;">
        <h3>⚠️ Проблема с WebSocket</h3>
        <p>Используем альтернативный метод отправки</p>
    </div>
    
    <button onclick="sendData()" style="padding: 20px; font-size: 20px; background: #40a7e3; color: white; border: none; border-radius: 10px; width: 100%; margin-bottom: 10px;">
        📤 Отправить данные
    </button>

    <script>
        let tg = null;
        
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                // Игнорируем ошибки WebSocket
                console.log('Telegram WebApp инициализирован');
            }
        } catch (e) {
            console.error('Ошибка:', e);
        }
        
        function sendData() {
            try {
                // Простой текст
                if (tg) {
                    tg.sendData('qr_code_detected');
                    alert('Данные отправлены!');
                } else {
                    alert('Telegram не инициализирован');
                }
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        }
    </script>
</body>
</html>
