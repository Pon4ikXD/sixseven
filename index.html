<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse QR Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .video-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #1a1a1a;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scan-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .scan-frame {
            width: 280px;
            height: 280px;
            border: 2px solid #40a7e3;
            border-radius: 24px;
            box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #40a7e3;
            top: 0;
            left: 0;
            animation: scan 2s ease-in-out infinite;
            box-shadow: 0 0 10px #40a7e3;
        }

        @keyframes scan {
            0% { top: 0; }
            50% { top: calc(100% - 2px); }
            100% { top: 0; }
        }

        .scan-corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: #40a7e3;
            border-style: solid;
            border-width: 0;
        }

        .corner-tl {
            top: -2px;
            left: -2px;
            border-top-width: 4px;
            border-left-width: 4px;
            border-radius: 24px 0 0 0;
        }

        .corner-tr {
            top: -2px;
            right: -2px;
            border-top-width: 4px;
            border-right-width: 4px;
            border-radius: 0 24px 0 0;
        }

        .corner-bl {
            bottom: -2px;
            left: -2px;
            border-bottom-width: 4px;
            border-left-width: 4px;
            border-radius: 0 0 0 24px;
        }

        .corner-br {
            bottom: -2px;
            right: -2px;
            border-bottom-width: 4px;
            border-right-width: 4px;
            border-radius: 0 0 24px 0;
        }

        .controls {
            background: #1a1a1a;
            padding: 20px;
            border-top: 1px solid #333;
            backdrop-filter: blur(10px);
        }

        .status {
            text-align: center;
            margin-bottom: 15px;
            color: #888;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .status.success { color: #4caf50; }
        .status.error { color: #ff5252; }
        .status.scanning { color: #40a7e3; }

        .button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            background: #40a7e3;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
            box-shadow: 0 4px 12px rgba(64, 167, 227, 0.3);
        }

        .button:active {
            transform: scale(0.98);
            opacity: 0.9;
            box-shadow: 0 2px 6px rgba(64, 167, 227, 0.4);
        }

        .button.stop {
            background: #ff3b30;
            box-shadow: 0 4px 12px rgba(255, 59, 48, 0.3);
        }

        .button:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .result {
            background: #1a4d1a;
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
            font-size: 14px;
            word-break: break-all;
            border: 1px solid #00ff00;
            box-shadow: 0 4px 12px rgba(0, 255, 0, 0.1);
        }

        .error-box {
            background: #4d1a1a;
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
            font-size: 14px;
            word-break: break-all;
            border: 1px solid #ff5252;
            box-shadow: 0 4px 12px rgba(255, 82, 82, 0.1);
        }

        .manual-section {
            background: #242424;
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            border: 1px solid #333;
        }

        .manual-input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #40a7e3;
            background: #1a1a1a;
            color: #fff;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
            transition: all 0.2s;
        }

        .manual-input:focus {
            border-color: #64b5f6;
            box-shadow: 0 0 0 2px rgba(64, 167, 227, 0.3);
        }

        .small-button {
            background: #333;
            padding: 12px;
            font-size: 14px;
            box-shadow: none;
            margin-bottom: 0;
        }

        .debug-log {
            font-family: monospace;
            font-size: 11px;
            color: #666;
            margin-top: 8px;
            padding: 8px;
            background: #0a0a0a;
            border-radius: 6px;
            max-height: 60px;
            overflow-y: auto;
        }

        .flex-row {
            display: flex;
            gap: 8px;
        }

        .flex-row .button {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="video" playsinline></video>
        <div class="scan-overlay">
            <div class="scan-frame">
                <div class="scan-line"></div>
                <div class="scan-corner corner-tl"></div>
                <div class="scan-corner corner-tr"></div>
                <div class="scan-corner corner-bl"></div>
                <div class="scan-corner corner-br"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="status" id="status">⏳ Запуск камеры...</div>

        <div class="flex-row">
            <button class="button" id="scanBtn" onclick="startScan()">▶️ Сканировать</button>
            <button class="button stop" id="stopBtn" onclick="stopScan()" style="display: none;">⏹️ Стоп</button>
        </div>

        <!-- Область для результатов -->
        <div id="resultArea"></div>

        <!-- Ручной ввод -->
        <div class="manual-section">
            <input type="text" class="manual-input" id="manualQr" placeholder="Вставьте QR-код или токен">
            <button class="button small-button" onclick="sendManualQr()">📤 Отправить вручную</button>
        </div>

        <!-- Отладочная информация -->
        <div class="debug-log" id="debugLog">✓ Система готова</div>
    </div>

    <script>
        // Глобальные переменные
        let tg = null;
        let webappReady = false;
        let debugMessages = [];

        // Элементы DOM
        const video = document.getElementById('video');
        const statusEl = document.getElementById('status');
        const scanBtn = document.getElementById('scanBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resultArea = document.getElementById('resultArea');
        const manualQrInput = document.getElementById('manualQr');
        const debugLogEl = document.getElementById('debugLog');

        // Состояние сканирования
        let stream = null;
        let scanning = false;
        let scanInterval = null;
        let lastScanTime = 0;
        const SCAN_INTERVAL = 100; // мс между сканированиями
        const MIN_QR_LENGTH = 10; // минимальная длина QR-кода

        // Инициализация Telegram
        function initTelegram() {
            try {
                if (window.Telegram && window.Telegram.WebApp) {
                    tg = window.Telegram.WebApp;
                    tg.ready();
                    tg.expand();
                    webappReady = true;

                    // Настраиваем главную кнопку
                    tg.MainButton.setText('Закрыть');
                    tg.MainButton.hide();

                    addDebugLog('✅ Telegram WebApp инициализирован');
                    updateStatus('✅ Telegram готов', 'success');
                    return true;
                } else {
                    addDebugLog('❌ Telegram WebApp не найден');
                    updateStatus('❌ Ошибка: откройте через бота', 'error');
                    return false;
                }
            } catch (e) {
                addDebugLog('❌ Ошибка Telegram: ' + e.message);
                updateStatus('❌ Ошибка инициализации', 'error');
                return false;
            }
        }

        // Обновление статуса
        function updateStatus(text, type = 'normal') {
            statusEl.textContent = text;
            statusEl.className = 'status';
            if (type === 'success') statusEl.classList.add('success');
            if (type === 'error') statusEl.classList.add('error');
            if (type === 'scanning') statusEl.classList.add('scanning');
        }

        // Добавление отладочного сообщения
        function addDebugLog(message) {
            const timestamp = new Date().toLocaleTimeString('ru-RU', {
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });

            debugMessages.unshift(`[${timestamp}] ${message}`);
            if (debugMessages.length > 5) debugMessages.pop();

            debugLogEl.innerHTML = debugMessages.join('<br>');
            console.log(message);
        }

        // Показать результат
        function showResult(message, isError = false) {
            const div = document.createElement('div');
            div.className = isError ? 'error-box' : 'result';
            div.textContent = message;

            resultArea.innerHTML = '';
            resultArea.appendChild(div);

            setTimeout(() => {
                if (resultArea.firstChild === div) {
                    div.style.opacity = '0';
                    div.style.transition = 'opacity 0.5s';
                    setTimeout(() => {
                        if (resultArea.firstChild === div) {
                            resultArea.innerHTML = '';
                        }
                    }, 500);
                }
            }, 5000);
        }

        // Запуск камеры
        async function initCamera() {
            try {
                updateStatus('⏳ Запрос доступа к камере...', 'normal');
                addDebugLog('📷 Запрос доступа к камере');

                // Оптимальные настройки для сканирования QR
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1920, max: 2560 },
                        height: { ideal: 1080, max: 1440 },
                        aspectRatio: { ideal: 1.7777777778 }
                    }
                });

                video.srcObject = stream;

                // Ждем готовности видео
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play().then(resolve);
                    };
                });

                updateStatus('✅ Камера готова. Нажмите "Сканировать"', 'success');
                addDebugLog(`✅ Камера запущена: ${video.videoWidth}x${video.videoHeight}`);
                scanBtn.disabled = false;

            } catch (err) {
                updateStatus('❌ Ошибка камеры', 'error');
                addDebugLog('❌ Ошибка камеры: ' + err.message);

                let errorMessage = '❌ Ошибка камеры';
                if (err.name === 'NotAllowedError') {
                    errorMessage = '❌ Доступ к камере запрещён';
                } else if (err.name === 'NotFoundError') {
                    errorMessage = '❌ Камера не найдена';
                } else if (err.name === 'NotReadableError') {
                    errorMessage = '❌ Камера занята другим приложением';
                }

                showResult(errorMessage, true);
            }
        }

        // Начать сканирование
        function startScan() {
            if (!stream) {
                initCamera();
                return;
            }

            scanning = true;
            scanBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            updateStatus('🔍 Сканирование... Наведите на QR-код', 'scanning');
            addDebugLog('▶️ Сканирование запущено');

            // Запускаем сканирование с оптимизированным интервалом
            if (scanInterval) clearInterval(scanInterval);
            scanInterval = setInterval(scanQR, SCAN_INTERVAL);
        }

        // Остановить сканирование
        function stopScan() {
            scanning = false;
            scanBtn.style.display = 'block';
            stopBtn.style.display = 'none';
            updateStatus('⏹️ Сканирование остановлено', 'normal');
            addDebugLog('⏹️ Сканирование остановлено');

            if (scanInterval) {
                clearInterval(scanInterval);
                scanInterval = null;
            }
        }

        // Сканирование QR-кода
        function scanQR() {
            if (!scanning || !video.videoWidth || !video.videoHeight) return;

            const now = Date.now();
            if (now - lastScanTime < SCAN_INTERVAL) return;
            lastScanTime = now;

            try {
                // Оптимизируем размер для скорости
                const scale = Math.min(1, 640 / Math.max(video.videoWidth, video.videoHeight));
                const width = Math.floor(video.videoWidth * scale);
                const height = Math.floor(video.videoHeight * scale);

                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;

                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(video, 0, 0, width, height);

                // Получаем данные изображения
                const imageData = ctx.getImageData(0, 0, width, height);

                // Пробуем разные режимы инверсии для сложных QR-кодов
                const attempts = [
                    { inversionAttempts: 'dontInvert' },
                    { inversionAttempts: 'attemptInvert' },
                    { inversionAttempts: 'invertFirst' }
                ];

                for (const attempt of attempts) {
                    const code = jsQR(imageData.data, width, height, attempt);

                    if (code && code.data && code.data.length >= MIN_QR_LENGTH) {
                        // Валидируем QR-код (должен содержать token или быть URL)
                        const qrData = code.data.trim();

                        if (qrData.includes('token=') ||
                            qrData.includes('attendance') ||
                            qrData.startsWith('http') ||
                            /^[A-Za-z0-9+/=]{20,}$/.test(qrData)) {

                            addDebugLog('✅ QR-код обнаружен: ' + qrData.substring(0, 50) + '...');
                            handleQRDetected(qrData);
                            break;
                        }
                    }
                }
            } catch (err) {
                // Тихая ошибка сканирования
                if (scanning) {
                    addDebugLog('⚠️ Ошибка сканирования: ' + err.message);
                }
            }
        }

        // Обработка найденного QR
        function handleQRDetected(qrData) {
            // Останавливаем сканирование
            stopScan();

            // Показываем результат
            showResult('✅ QR найден: ' + qrData.substring(0, 100) + '...');
            updateStatus('✅ QR-код обнаружен!', 'success');

            // Отправляем в бота
            sendToBot(qrData);
        }

        // Отправка данных в бота (основной метод)
        function sendToBot(qrData) {
            if (!webappReady || !tg) {
                addDebugLog('❌ Telegram не инициализирован');
                showResult('❌ Ошибка: Telegram не инициализирован', true);
                return;
            }

            try {
                // Формируем данные в нескольких форматах для совместимости
                const payload = {
                    type: 'qr_scanned',
                    code: qrData,
                    timestamp: Date.now(),
                    source: 'webapp'
                };

                // Формат 1: полный объект
                const jsonStr1 = JSON.stringify(payload);

                // Формат 2: упрощённый (для обратной совместимости)
                const jsonStr2 = JSON.stringify({ qr: qrData });

                // Формат 3: только код
                const jsonStr3 = JSON.stringify({ data: qrData, type: 'qr' });

                addDebugLog('📤 Отправка данных...');

                // Пробуем отправить в разных форматах
                try {
                    tg.sendData(jsonStr1);
                    addDebugLog('✅ Отправлено (формат 1)');
                } catch (e1) {
                    try {
                        tg.sendData(jsonStr2);
                        addDebugLog('✅ Отправлено (формат 2)');
                    } catch (e2) {
                        try {
                            tg.sendData(jsonStr3);
                            addDebugLog('✅ Отправлено (формат 3)');
                        } catch (e3) {
                            throw new Error('Все форматы отправки не удались');
                        }
                    }
                }

                // Успех
                updateStatus('✅ QR-код отправлен!', 'success');
                showResult('✅ QR-код успешно отправлен в бота!');

                // Показываем кнопку закрытия
                tg.MainButton.setText('✅ Закрыть');
                tg.MainButton.show();
                tg.MainButton.onClick(() => {
                    tg.close();
                });

                addDebugLog('✅ Данные успешно отправлены');

            } catch (err) {
                addDebugLog('❌ Ошибка отправки: ' + err.message);
                updateStatus('❌ Ошибка отправки', 'error');
                showResult('❌ Ошибка отправки: ' + err.message, true);
            }
        }

        // Ручная отправка
        function sendManualQr() {
            const qrText = manualQrInput.value.trim();
            if (!qrText) {
                showResult('❌ Введите QR-код', true);
                return;
            }

            if (qrText.length < MIN_QR_LENGTH) {
                showResult('❌ QR-код слишком короткий', true);
                return;
            }

            addDebugLog('📤 Ручная отправка: ' + qrText.substring(0, 50) + '...');
            sendToBot(qrText);
            manualQrInput.value = '';
        }

        // Очистка ресурсов
        function cleanup() {
            if (stream) {
                stream.getTracks().forEach(track => {
                    track.stop();
                    addDebugLog('⏹️ Трек остановлен: ' + track.kind);
                });
                stream = null;
            }
            if (scanInterval) {
                clearInterval(scanInterval);
                scanInterval = null;
            }
        }

        // Инициализация
        async function init() {
            const telegramOk = initTelegram();
            if (telegramOk) {
                await initCamera();
            }
        }

        // Обработчики событий
        window.addEventListener('load', init);
        window.addEventListener('beforeunload', cleanup);

        // Обработка ошибок видео
        video.addEventListener('error', (e) => {
            addDebugLog('❌ Ошибка видео: ' + e.message);
            updateStatus('❌ Ошибка видео', 'error');
        });

    </script>
</body>
</html>
