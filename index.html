<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 20px; background: #f0f0f0;">
    <h1>📷 QR Scanner</h1>
    
    <div style="background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
        <h3>⚠️ Важно!</h3>
        <p id="warning" style="color: red; font-weight: bold;">Проверка...</p>
    </div>
    
    <button onclick="sendTest()" style="padding: 20px; font-size: 20px; background: #40a7e3; color: white; border: none; border-radius: 10px; width: 100%; margin-bottom: 10px;">
        📤 Отправить тест
    </button>
    
    <div id="debug" style="background: #000; color: #0f0; padding: 10px; border-radius: 5px; font-size: 12px; text-align: left; height: 200px; overflow: auto;"></div>

    <script>
        const debug = document.getElementById('debug');
        const warning = document.getElementById('warning');
        
        function addDebug(text) {
            debug.innerHTML += `[${new Date().toLocaleTimeString()}] ${text}<br>`;
            console.log(text);
        }

        // Проверяем, открыто ли в Telegram
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            
            if (tg.initData) {
                warning.innerHTML = '✅ Открыто в Telegram';
                warning.style.color = 'green';
                addDebug('✅ Есть initData - можно отправлять');
                
                tg.ready();
                tg.expand();
                
                function sendTest() {
                    try {
                        addDebug('📤 Отправка теста...');
                        tg.sendData('test_message_123');
                        addDebug('✅ Отправлено!');
                    } catch (e) {
                        addDebug('❌ Ошибка: ' + e.message);
                    }
                }
            } else {
                warning.innerHTML = '❌ Открыто НЕ в Telegram (нет initData)';
                warning.style.color = 'red';
                addDebug('❌ Нет initData - это браузер, а не Telegram');
                
                function sendTest() {
                    alert('Это тест в браузере. Откройте через Telegram бота!');
                }
            }
        } else {
            warning.innerHTML = '❌ Telegram WebApp не найден';
            warning.style.color = 'red';
            addDebug('❌ Telegram WebApp не найден');
            
            function sendTest() {
                alert('Telegram WebApp не найден!');
            }
        }
    </script>
</body>
</html>
