<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulse QR Scanner</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>📷 Pulse QR</h1>
            <div class="badge" id="tgStatus">⚪ TG</div>
        </header>

        <div class="video-container">
            <video id="video" playsinline autoplay></video>
            <div class="scan-overlay">
                <div class="scan-frame">
                    <div class="scan-line"></div>
                    <div class="corner top-left"></div>
                    <div class="corner top-right"></div>
                    <div class="corner bottom-left"></div>
                    <div class="corner bottom-right"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn primary" id="scanBtn">▶️ Начать сканирование</button>
            <button class="btn secondary" id="stopBtn" style="display: none;">⏹️ Остановить</button>
        </div>

        <div class="status-card">
            <div id="status">📱 Нажми "Начать сканирование"</div>
            <div id="result" class="result hidden"></div>
        </div>

        <div class="manual-card">
            <input type="text" id="manualInput" placeholder="Вставьте QR‑код или токен">
            <button class="btn secondary" id="manualSend">📤 Отправить</button>
        </div>

        <div class="debug" id="debug"></div>
    </div>
    <script src="js/scanner.js"></script>
</body>
</html>
