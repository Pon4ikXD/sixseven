<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse QR Scanner</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0;
            margin: 0;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--tg-theme-bg-color, #000);
            color: var(--tg-theme-text-color, #fff);
        }

        .header {
            padding: 16px;
            text-align: center;
            background: var(--tg-theme-secondary-bg-color, #1a1a1a);
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: var(--tg-theme-text-color, #fff);
        }

        .header p {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #888);
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 16px auto;
            border-radius: 16px;
            overflow: hidden;
            background: #1a1a1a;
            aspect-ratio: 4/3;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #canvas {
            display: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 3px solid var(--tg-theme-button-color, #40a7e3);
            border-radius: 16px;
            pointer-events: none;
        }

        .scan-line {
            position: absolute;
            left: 10%;
            right: 10%;
            height: 2px;
            background: var(--tg-theme-button-color, #40a7e3);
            animation: scan 2s linear infinite;
            box-shadow: 0 0 10px var(--tg-theme-button-color, #40a7e3);
        }

        @keyframes scan {
            0% { top: 10%; }
            50% { top: 90%; }
            100% { top: 10%; }
        }

        .status-panel {
            background: var(--tg-theme-secondary-bg-color, #1a1a1a);
            border-radius: 16px;
            padding: 16px;
            margin: 16px;
            border: 1px solid var(--tg-theme-hint-color, #333);
        }

        .status-text {
            font-size: 16px;
            margin-bottom: 12px;
            color: var(--tg-theme-text-color, #fff);
        }

        .qr-result {
            background: #1a4d1a;
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
            word-break: break-all;
            border: 1px solid #00ff00;
            display: none;
        }

        .qr-result.active {
            display: block;
        }

        .qr-result.error {
            background: #4d1a1a;
            border-color: #ff0000;
        }

        .button-group {
            display: flex;
            gap: 10px;
            padding: 0 16px 16px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 16px 20px;
            border-radius: 14px;
            border: none;
            font-size: 16px;
            font-weight: 500;
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #fff);
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        button:active {
            transform: scale(0.98);
            opacity: 0.8;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.stop {
            background: #ff3b30;
        }

        .info {
            padding: 16px;
            font-size: 13px;
            color: var(--tg-theme-hint-color, #888);
            text-align: center;
        }

        #sessionId {
            font-family: monospace;
            background: var(--tg-theme-bg-color, #000);
            padding: 4px 8px;
            border-radius: 4px;
            color: var(--tg-theme-button-color, #40a7e3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📷 Pulse QR Scanner</h1>
            <p>Наведите камеру на QR-код пары</p>
        </div>

        <div class="video-container">
            <video id="video" playsinline></video>
            <canvas id="canvas"></canvas>
            <div class="overlay"></div>
            <div class="scan-line"></div>
        </div>

        <div class="status-panel">
            <div class="status-text" id="status">⏳ Запуск камеры...</div>
            <div id="qrResult" class="qr-result"></div>
        </div>

        <div class="button-group">
            <button onclick="startScanning()" id="startBtn">▶️ Начать</button>
            <button onclick="stopScanning()" id="stopBtn" class="stop" style="display: none;">⏹️ Остановить</button>
            <button onclick="closeScanner()" id="closeBtn">❌ Закрыть</button>
        </div>

        <div class="info">
            Сессия: <span id="sessionId"></span><br>
            QR будет обнаружен автоматически
        </div>
    </div>

    <script>
        let tg = window.Telegram?.WebApp;
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let scanning = false;
        let animationFrame = null;
        let lastScanTime = 0;
        const SCAN_INTERVAL = 500; // Сканируем каждые 500ms

        // Получаем параметры из URL
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session') || 'default';
        document.getElementById('sessionId').textContent = sessionId;

        // Инициализация Telegram
        function initTelegram() {
            if (tg) {
                tg.ready();
                tg.expand();
                tg.MainButton.setText('Закрыть');
                tg.MainButton.onClick(() => tg.close());
                setStatus('✅ Telegram WebApp готов');
            } else {
                setStatus('⚠️ Режим без Telegram (тестовый)');
            }
        }

        // Запуск камеры
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });

                video.srcObject = stream;
                video.setAttribute('playsinline', true);

                await video.play();

                // Устанавливаем размер canvas
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                setStatus('✅ Камера готова');
                return true;

            } catch (err) {
                console.error('Camera error:', err);
                setStatus('❌ Ошибка камеры: ' + err.message);
                return false;
            }
        }

        // Сканирование QR
        function scanQR() {
            if (!scanning || !video.videoWidth) return;

            const now = Date.now();
            if (now - lastScanTime < SCAN_INTERVAL) {
                animationFrame = requestAnimationFrame(scanQR);
                return;
            }

            lastScanTime = now;

            try {
                // Рисуем кадр на canvas
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                // Получаем данные пикселей
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

                // Ищем QR код
                const code = jsQR(imageData.data, canvas.width, canvas.height, {
                    inversionAttempts: 'dontInvert'
                });

                if (code) {
                    console.log('QR found:', code.data);
                    handleQRDetected(code.data);
                }

            } catch (err) {
                console.error('Scan error:', err);
            }

            animationFrame = requestAnimationFrame(scanQR);
        }

        // Обработка найденного QR
        async function handleQRDetected(qrData) {
            // Показываем результат
            const qrResult = document.getElementById('qrResult');
            qrResult.textContent = `✅ QR найден: ${qrData.substring(0, 50)}...`;
            qrResult.classList.add('active');

            // Отправляем в бота
            sendToBot(qrData);

            // Отправляем на сервер (для WebSocket)
            await sendQRToServer(qrData);

            // Останавливаем сканирование
            stopScanning();
        }

        // Отправка QR в бота
        function sendToBot(qrText) {
            if (!tg) {
                setStatus('❌ Telegram не инициализирован');
                return;
            }

            const payload = {
                type: 'qr_scanned',
                code: qrText,
                session_id: sessionId,
                timestamp: Date.now()
            };

            tg.sendData(JSON.stringify(payload));
            setStatus('✅ QR отправлен в бота');

            // Показываем главную кнопку
            tg.MainButton.show();
        }

        // Отправка QR на сервер (для WebSocket)
        async function sendQRToServer(qrData) {
            try {
                // Здесь можно добавить отправку на ваш сервер
                // если нужна дополнительная обработка
                console.log('QR data for server:', qrData);
            } catch (err) {
                console.error('Server send error:', err);
            }
        }

        // Управление сканированием
        function startScanning() {
            if (!video.srcObject) {
                setStatus('❌ Камера не запущена');
                return;
            }

            scanning = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            setStatus('🔍 Сканирование...');

            scanQR();
        }

        function stopScanning() {
            scanning = false;
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';

            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
            }

            setStatus('⏹️ Сканирование остановлено');
        }

        function closeScanner() {
            // Останавливаем видео
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            // Закрываем WebApp
            if (tg) {
                tg.close();
            } else {
                window.close();
            }
        }

        function setStatus(text) {
            document.getElementById('status').textContent = text;
        }

        // Инициализация
        window.addEventListener('load', async () => {
            initTelegram();
            const cameraStarted = await startCamera();

            if (!cameraStarted) {
                document.getElementById('startBtn').disabled = true;
            }
        });

        // Очистка при закрытии
        window.addEventListener('beforeunload', () => {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
