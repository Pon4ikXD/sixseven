<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .video-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #1a1a1a;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scan-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .scan-frame {
            width: 250px;
            height: 250px;
            border: 2px solid #40a7e3;
            border-radius: 20px;
            box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.5);
        }

        .controls {
            background: #1a1a1a;
            padding: 16px;
            border-top: 1px solid #333;
        }

        .status {
            text-align: center;
            margin-bottom: 12px;
            color: #888;
            font-size: 14px;
        }

        .button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            background: #40a7e3;
            color: white;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-bottom: 8px;
        }

        .button:active {
            opacity: 0.8;
        }

        .button.stop {
            background: #ff3b30;
        }

        .result {
            background: #1a4d1a;
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
            font-size: 12px;
            word-break: break-all;
            display: none;
        }

        .result.active {
            display: block;
            border: 1px solid #00ff00;
        }

        .error {
            background: #4d1a1a;
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
            font-size: 12px;
            word-break: break-all;
            display: none;
            border: 1px solid #ff0000;
        }

        .error.active {
            display: block;
        }

        .manual-send {
            background: #333;
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
        }

        .manual-send input {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #40a7e3;
            background: #222;
            color: #fff;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="video" playsinline></video>
        <div class="scan-overlay">
            <div class="scan-frame"></div>
        </div>
    </div>

    <div class="controls">
        <div class="status" id="status">⏳ Запуск камеры...</div>

        <button class="button" id="scanBtn" onclick="startScan()">▶️ Начать сканирование</button>
        <button class="button stop" id="stopBtn" onclick="stopScan()" style="display: none;">⏹️ Остановить</button>
        
        <div class="result" id="result"></div>
        <div class="error" id="error"></div>
        
        <!-- Ручной ввод на случай проблем с камерой -->
        <div class="manual-send">
            <input type="text" id="manualQr" placeholder="Вставьте QR-код вручную">
            <button class="button" onclick="sendManualQr()">📤 Отправить вручную</button>
        </div>
    </div>

    <script>
        // Инициализация Telegram
        let tg = null;
        let webappReady = false;
        
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                webappReady = true;
                console.log('✅ Telegram WebApp инициализирован');
                showStatus('✅ Telegram готов');
            } else {
                console.error('❌ Telegram WebApp не найден');
                showError('❌ Ошибка: откройте через бота Telegram');
            }
        } catch (e) {
            console.error('❌ Ошибка инициализации Telegram:', e);
            showError('❌ Ошибка: ' + e.message);
        }

        const video = document.getElementById('video');
        const statusEl = document.getElementById('status');
        const scanBtn = document.getElementById('scanBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resultEl = document.getElementById('result');
        const errorEl = document.getElementById('error');
        const manualQrInput = document.getElementById('manualQr');

        let stream = null;
        let scanning = false;
        let scanInterval = null;

        function showStatus(text) {
            statusEl.textContent = text;
            console.log('Status:', text);
        }

        function showResult(text) {
            resultEl.textContent = text;
            resultEl.classList.add('active');
            setTimeout(() => {
                resultEl.classList.remove('active');
            }, 5000);
        }

        function showError(text) {
            errorEl.textContent = text;
            errorEl.classList.add('active');
            console.error('Error:', text);
            setTimeout(() => {
                errorEl.classList.remove('active');
            }, 5000);
        }

        // Запуск камеры
        async function initCamera() {
            try {
                showStatus('⏳ Запрос доступа к камере...');

                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });

                video.srcObject = stream;
                await video.play();

                showStatus('✅ Камера готова. Нажмите "Начать сканирование"');
                scanBtn.disabled = false;

            } catch (err) {
                showStatus('❌ Ошибка камеры: ' + err.message);
                showError('❌ Ошибка камеры: ' + err.message);
                
                if (err.name === 'NotAllowedError') {
                    showError('❌ Доступ к камере запрещен. Разрешите в настройках браузера.');
                } else if (err.name === 'NotFoundError') {
                    showError('❌ Камера не найдена на устройстве');
                }
            }
        }

        // Начать сканирование
        function startScan() {
            if (!stream) {
                initCamera();
                return;
            }

            scanning = true;
            scanBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            showStatus('🔍 Сканирование... Наведите на QR-код');

            scanInterval = setInterval(scanQR, 200);
        }

        // Остановить сканирование
        function stopScan() {
            scanning = false;
            scanBtn.style.display = 'block';
            stopBtn.style.display = 'none';
            showStatus('⏹️ Сканирование остановлено');

            if (scanInterval) {
                clearInterval(scanInterval);
            }
        }

        // Сканирование QR
        function scanQR() {
            if (!scanning || !video.videoWidth) return;

            try {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.width = Math.min(canvas.width, 640); // Оптимизация
                canvas.height = video.videoHeight;
                canvas.height = Math.min(canvas.height, 480);

                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, canvas.width, canvas.height, {
                    inversionAttempts: 'dontInvert'
                });

                if (code && code.data && code.data.length > 10) {
                    console.log('✅ QR найден:', code.data.substring(0, 50));
                    
                    // Останавливаем сканирование
                    stopScan();

                    // Показываем результат
                    showResult('✅ QR найден: ' + code.data.substring(0, 50) + '...');
                    
                    // Отправляем в бота
                    sendToBot(code.data);
                }
            } catch (err) {
                console.error('Scan error:', err);
            }
        }

        // Отправка данных в бота
        function sendToBot(qrData) {
            if (!webappReady || !tg) {
                showError('❌ Telegram не инициализирован');
                return;
            }

            try {
                // Формируем данные
                const payload = {
                    type: 'qr_scanned',
                    code: qrData,
                    timestamp: Date.now()
                };

                const jsonStr = JSON.stringify(payload);
                
                console.log('📤 Отправка данных:', jsonStr);
                showStatus('📤 Отправка данных...');

                // Отправляем через Telegram WebApp
                tg.sendData(jsonStr);

                showStatus('✅ QR-код отправлен!');
                showResult('✅ Отправлено! Проверьте бота');

                // Показываем кнопку закрытия
                tg.MainButton.setText('✅ Закрыть');
                tg.MainButton.show();
                tg.MainButton.onClick(() => {
                    tg.close();
                });

            } catch (err) {
                console.error('❌ Ошибка отправки:', err);
                showError('❌ Ошибка отправки: ' + err.message);
                
                // Пробуем альтернативный метод
                tryAlternativeSend(qrData);
            }
        }

        // Альтернативный метод отправки
        function tryAlternativeSend(qrData) {
            try {
                if (tg && tg.sendData) {
                    const simpleData = JSON.stringify({ qr: qrData });
                    tg.sendData(simpleData);
                    console.log('📤 Альтернативная отправка:', simpleData);
                    showStatus('✅ Отправлено (альт.)');
                }
            } catch (e) {
                showError('❌ Не удалось отправить');
            }
        }

        // Ручная отправка
        function sendManualQr() {
            const qrText = manualQrInput.value.trim();
            if (!qrText) {
                showError('❌ Введите QR-код');
                return;
            }
            sendToBot(qrText);
        }

        // Запускаем камеру при загрузке
        initCamera();

        // Очистка при закрытии
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            if (scanInterval) {
                clearInterval(scanInterval);
            }
        });
    </script>
</body>
</html>
