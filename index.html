<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 20px; background: #f0f0f0;">
    <h1>📷 QR Scanner Debug</h1>
    
    <div style="background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: left;">
        <h3>📊 Статус:</h3>
        <div id="status" style="color: #666; margin: 10px 0;">Проверка...</div>
        <div id="debug" style="background: #000; color: #0f0; padding: 10px; border-radius: 5px; font-size: 12px; height: 100px; overflow: auto;"></div>
    </div>
    
    <button onclick="sendTest()" style="padding: 20px; font-size: 20px; background: #40a7e3; color: white; border: none; border-radius: 10px; width: 100%; margin-bottom: 10px; cursor: pointer;">
        📤 1. Отправить тест
    </button>
    
    <button onclick="checkTelegram()" style="padding: 15px; font-size: 16px; background: #34c759; color: white; border: none; border-radius: 10px; width: 100%; cursor: pointer;">
        🔍 2. Проверить Telegram
    </button>

    <script>
        // Функция для добавления отладочной информации
        function addDebug(text, isError = false) {
            const debug = document.getElementById('debug');
            const time = new Date().toLocaleTimeString();
            const color = isError ? '#ff6b6b' : '#0f0';
            debug.innerHTML += `<span style="color: ${color}">[${time}] ${text}</span><br>`;
            debug.scrollTop = debug.scrollHeight;
            console.log(text);
        }

        // Проверка Telegram
        function checkTelegram() {
            addDebug('🔍 Проверка Telegram...');
            
            if (window.Telegram) {
                addDebug('✅ window.Telegram существует');
                
                if (window.Telegram.WebApp) {
                    addDebug('✅ window.Telegram.WebApp существует');
                    addDebug(`initData: ${window.Telegram.WebApp.initData ? 'есть' : 'нет'}`);
                    addDebug(`initDataUnsafe: ${window.Telegram.WebApp.initDataUnsafe ? 'есть' : 'нет'}`);
                    addDebug(`version: ${window.Telegram.WebApp.version}`);
                } else {
                    addDebug('❌ window.Telegram.WebApp отсутствует', true);
                }
            } else {
                addDebug('❌ window.Telegram отсутствует', true);
            }
        }

        // Инициализация
        let tg = null;
        try {
            addDebug('🚀 Инициализация...');
            
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                addDebug('✅ Telegram.WebApp инициализирован');
                addDebug(`Версия: ${tg.version}`);
                addDebug(`initData: ${tg.initData ? 'есть' : 'нет'}`);
                
                document.getElementById('status').innerHTML = '✅ Telegram готов';
            } else {
                throw new Error('Telegram WebApp не найден');
            }
        } catch (e) {
            addDebug(`❌ Ошибка: ${e.message}`, true);
            document.getElementById('status').innerHTML = '❌ Ошибка инициализации';
        }

        // Отправка теста
        function sendTest() {
            addDebug('📤 Нажата кнопка отправки');
            
            if (!tg) {
                addDebug('❌ Telegram не инициализирован', true);
                document.getElementById('status').innerHTML = '❌ Telegram не инициализирован';
                return;
            }
            
            try {
                // Пробуем отправить простую строку
                const testString = 'test_message_123';
                addDebug(`📤 Отправляем: "${testString}"`);
                
                tg.sendData(testString);
                
                addDebug('✅ sendData() выполнен без ошибок');
                document.getElementById('status').innerHTML = '✅ Данные отправлены!';
                
            } catch (e) {
                addDebug(`❌ Ошибка отправки: ${e.message}`, true);
                addDebug(`Стек: ${e.stack}`, true);
                document.getElementById('status').innerHTML = `❌ Ошибка: ${e.message}`;
            }
        }
    </script>
</body>
</html>
